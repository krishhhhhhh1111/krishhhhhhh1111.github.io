}

body{
    background:#050505;
    color:#ffffff;
    height:100vh;
    display:flex;
    justify-content:center;

    overflow:hidden;

.container{

    position:absolute;

    height:500px;
    background:white;
    filter:blur(220px);

    50%{
        transform:translateY(-40px);
