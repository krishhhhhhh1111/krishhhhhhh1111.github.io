<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>crisx.in</title>

<meta property="og:title" content="crisx.in">
<meta property="og:description" content="fuck off bitch. i'm still learning.">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
    background:#050505;
    color:#ffffff;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    text-align:center;
    padding:20px;
}

h1{
    font-size:clamp(2.5rem,7vw,5rem);
    font-weight:800;
    letter-spacing:-2px;
    margin-bottom:15px;
}

.subtitle{
    color:#777;
    font-size:clamp(1rem,2vw,1.3rem);
}

.email-box{
    position:fixed;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;

    opacity:0;
    animation:fadeIn 1.5s ease forwards;
    animation-delay:3s;
}

.label{
    color:#555;
    font-size:12px;
    letter-spacing:4px;
    text-transform:uppercase;
    margin-bottom:8px;
}

.email{
    color:#bdbdbd;
    text-decoration:none;
    font-size:16px;
    letter-spacing:1px;
    transition:.3s;
}

.email:hover{
    color:white;
}

.glow{
    position:absolute;
    width:700px;
    height:700px;
    border-radius:50%;
    background:white;
    filter:blur(250px);
    opacity:.03;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateX(-50%) translateY(10px);
    }
    to{
        opacity:1;
        transform:translateX(-50%) translateY(0);
    }
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="container">
    <h1>fuck off bitch.</h1>
    <p class="subtitle">i'm still learning.</p>
</div>

<div class="email-box">
    <div class="label">say hi</div>
    <a class="email" href="mailto:hi@crisx.in">hi@crisx.in</a>
</div>

</body>
</html>
